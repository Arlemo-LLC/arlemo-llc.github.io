<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arlemo LLC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 540px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1.15rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .contact {
      font-size: 0.95rem;
      color: #777;
    }

    .contact a {
      color: #555;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
    }

    .contact a:hover {
      color: #1a1a1a;
      border-color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Arlemo</h1>
    <p class="tagline">A software company.</p>

  </div>
</body>
</html>
